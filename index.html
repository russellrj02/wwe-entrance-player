<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWE Entrance Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <img class="wwe-logo" 
             src="https://github.com/russellrj02/wwe-entrance-player/releases/download/v1.0/attitude.jpg" 
             alt="WWE Logo">

        <h1 class="header-text">Titantron Packages</h1>
    </header>

    <div id="wrestlerContainer" class="grid"></div>

    <!-- Video Modal -->
    <div id="videoModal" class="modal">

        <!-- X button OUTSIDE -->
        <span id="closeBtn" class="close-outside">&times;</span>

        <!-- Metal frame wrapper -->
        <div class="metal-frame">
            <div class="modal-content flashing-border" id="videoFrame">
                <video id="videoPlayer" controls autoplay></video>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
